<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Filme</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/theme.js"></script>
</head>
<body>
    <button id="btn-tema" onclick="alternarTema()">🌙 Tema Escuro</button>

    <h1>Detalhes do Filme</h1>

    <div class="card" style="max-width: 600px; width: 100%; margin-bottom: 20px;">
        <h2 th:text="${filme.titulo}"></h2>
        <p><strong>Gênero:</strong> <span th:text="${filme.genero}"></span></p>
        <p><strong>Ano:</strong> <span th:text="${filme.anoLancamento}"></span></p>
        <p><strong>Sinopse:</strong> <span th:text="${filme.sinopse}"></span></p>
    </div>

    <form th:action="@{/filmes/detalhes/{id}/analise(id=${filme.id})}" method="post">
        <h3>Adicionar Análise</h3>
        <label for="analise">Sua Análise:</label>
        <textarea id="analise" name="analise" rows="3" required></textarea>

        <label for="nota">Nota (0-10):</label>
        <input type="number" id="nota" name="nota" step="0.1" min="0" max="10" required />

        <button type="submit" class="btn">Enviar Análise</button>
    </form>

    <div class="card" style="max-width: 600px; width: 100%; margin-top: 20px;" th:if="${!filme.analises.isEmpty()}">
        <h3>Comentários e Avaliações</h3>
        <ul style="list-style-type: none; padding: 0;">
            <li th:each="analise : ${filme.analises}" style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px;">
                <strong style="color: var(--primary-color);" th:text="'Nota: ' + ${analise.nota}"></strong> -
                <span th:text="${analise.analise}"></span>
            </li>
        </ul>
    </div>

    <br>
    <a href="/filmes" class="btn btn-danger">Voltar para a lista</a>
</body>
</html>
