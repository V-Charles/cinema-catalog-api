<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Editar Filme</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/theme.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <button id="btn-tema" onclick="alternarTema()">🌙 Tema Escuro</button>
  <h1>Editar Filme</h1>

  <input type="hidden" id="filmeId" th:value="${filme.id}" />

  <form id="formEdicao">
    <label>Título:</label>
    <input type="text" id="titulo" th:value="${filme.titulo}" required /><br/>

    <label>Sinopse:</label>
    <input type="text" id="sinopse" th:value="${filme.sinopse}" required /><br/>

    <label>Gênero:</label>
    <input type="text" id="genero" th:value="${filme.genero}" required /><br/>

    <label>Ano:</label>
    <input type="number" id="anoLancamento" th:value="${filme.anoLancamento}" required /><br/>

    <button type="submit">Atualizar Filme</button>
  </form>

  <a href="/filmes">Cancelar</a>

  <script>
    $(document).ready(function() {
        $('#formEdicao').submit(function(event) {
            event.preventDefault();

            var id = $('#filmeId').val();

            var filmeAtualizado = {
                titulo: $('#titulo').val(),
                sinopse: $('#sinopse').val(),
                genero: $('#genero').val(),
                anoLancamento: $('#anoLancamento').val()
            };

            $.ajax({
                url: '/api/filmes/' + id,
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify(filmeAtualizado),
                success: function() {
                    alert('Filme atualizado com sucesso!');
                    window.location.href = '/filmes';
                },
                error: function() {
                    alert('Erro ao atualizar.');
                }
            });
        });
    });
  </script>
</body>
</html>
