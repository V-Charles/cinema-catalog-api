<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Filmes</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/theme.js"></script>
</head>
<body>
    <button id="btn-tema" onclick="alternarTema()">🌙 Tema Escuro</button>

    <h1>Filmes em Cartaz</h1>

    <a href="/filmes/cadastrar" class="btn">Cadastrar Novo Filme</a>

    <div class="grid-container">
        <div class="card" th:each="filme : ${filmes}">
            <h2 th:text="${filme.titulo}">Título do Filme</h2>
            <p><strong>Gênero:</strong> <span th:text="${filme.genero}"></span></p>
            <p><strong>Ano:</strong> <span th:text="${filme.anoLancamento}"></span></p>

            <div class="card-actions">
                <a th:href="@{/filmes/detalhes/{id}(id=${filme.id})}" class="btn">Detalhes</a>
                <a th:href="@{/filmes/editar/{id}(id=${filme.id})}" class="btn">Editar</a>

                <form th:action="@{/filmes/excluir/{id}(id=${filme.id})}" method="post" class="form-inline" onsubmit="return confirm('Tem certeza que deseja excluir este filme?');">
                    <button type="submit" class="btn btn-danger">Excluir</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
