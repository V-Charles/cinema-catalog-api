<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Filmes</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/theme.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <button id="btn-tema" onclick="alternarTema()">🌙 Tema Escuro</button>
    <h1>Filmes em Cartaz</h1>
    <a href="/filmes/cadastrar">Cadastrar Novo Filme</a>
    <hr/>
    <table border="1">
        <thead>
        <tr>
            <th>Título</th>
            <th>Gênero</th>
            <th>Ano</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="filme : ${filmes}">
            <td th:text="${filme.titulo}"></td>
            <td th:text="${filme.genero}"></td>
            <td th:text="${filme.anoLancamento}"></td>
            <td>
                <a th:href="@{/filmes/detalhes/{id}(id=${filme.id})}">Detalhes</a> |

                <a th:href="@{/filmes/editar/{id}(id=${filme.id})}">Editar</a> |

                <button th:onclick="'excluirFilme(' + ${filme.id} + ')'">Excluir</button>
            </td>
        </tr>
        </tbody>
    </table>

    <script>
        function excluirFilme(id) {
            if (confirm('Tem certeza que deseja excluir este filme?')) {
                $.ajax({
                    url: '/api/filmes/' + id,
                    type: 'DELETE',
                    success: function() {
                        alert('Filme excluído!');
                        window.location.reload();
                    },
                    error: function() {
                        alert('Erro ao excluir.');
                    }
                });
            }
        }
    </script>
</body>
</html>
