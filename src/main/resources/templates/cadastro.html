<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Filme</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/theme.js"></script>
</head>
<body>
    <button id="btn-tema" onclick="alternarTema()">🌙 Tema Escuro</button>

    <h1>Cadastrar Novo Filme</h1>

    <form th:action="@{/filmes/cadastrar}" th:object="${filme}" method="post">
        <label for="titulo">Título:</label>
        <input type="text" id="titulo" th:field="*{titulo}" required />

        <label for="sinopse">Sinopse:</label>
        <textarea id="sinopse" th:field="*{sinopse}" rows="4" required></textarea>

        <label for="genero">Gênero:</label>
        <input type="text" id="genero" th:field="*{genero}" required />

        <label for="anoLancamento">Ano de Lançamento:</label>
        <input type="number" id="anoLancamento" th:field="*{anoLancamento}" required />

        <button type="submit" class="btn">Salvar Filme</button>
    </form>

    <br>
    <a href="/filmes" class="btn btn-danger">Cancelar e Voltar</a>
</body>
</html>
